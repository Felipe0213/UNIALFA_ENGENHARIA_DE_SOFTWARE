<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Controle de Presença</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Sistema de Controle de Presença</h1>

</header>

<main>

<div class="container">

<h2>Login</h2>

<form id="loginForm">

<label>Email</label>
<input
type="email"
id="email"
placeholder="Digite seu email"
required>

<label>Senha</label>

<input
type="password"
id="senha"
placeholder="Digite sua senha"
required>

<button type="submit">

Entrar

</button>

</form>

<p id="mensagem"></p>

</div>

</main>

<script src="script.js"></script>

</body>

</html>
